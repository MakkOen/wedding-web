<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pavlína &amp; Luděk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: Georgia, 'Times New Roman', serif;
            background: #fafafa;
            color: #333;
            padding: 2rem 1rem;
        }
        img.invitation {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            margin-bottom: 3rem;
        }

        /* ── Tab bar ── */
        .tab-bar {
            display: flex;
            max-width: 480px;
            width: 100%;
            border-bottom: 1px solid #ddd;
            margin-bottom: 2.5rem;
        }
        .tab-bar button {
            flex: 1;
            padding: 0.7rem 1rem;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 0.95rem;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: #888;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: color 0.15s, border-color 0.15s;
            margin-bottom: -1px;
        }
        .tab-bar button:hover { color: #555; }
        .tab-bar button.active {
            color: #333;
            border-bottom-color: #333;
        }

        /* ── RSVP tab ── */
        .rsvp-section {
            max-width: 480px;
            width: 100%;
            text-align: center;
            margin-bottom: 3rem;
        }
        .rsvp-form { text-align: left; }
        .rsvp-section h2 {
            font-weight: normal;
            font-size: 1.8rem;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: #555;
        }
        .rsvp-section p.subtitle {
            font-style: italic;
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .rsvp-form label {
            display: block;
            text-align: left;
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 0.3rem;
            margin-top: 1rem;
        }
        .rsvp-form input {
            width: 100%;
            padding: 0.7rem 1rem;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            color: #333;
            transition: border-color 0.2s;
        }
        .rsvp-form input:focus {
            outline: none;
            border-color: #999;
        }
        .rsvp-form input[type="number"] { max-width: 120px; }
        .rsvp-form button {
            display: block;
            margin-top: 2.5rem;
            padding: 0.8rem 2.5rem;
            font-family: Georgia, 'Times New Roman', serif;
            font-size: 1rem;
            background: #333;
            color: #fafafa;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: background 0.2s;
        }
        .rsvp-form button:hover { background: #555; }
        .rsvp-form button:disabled { background: #aaa; cursor: not-allowed; }
        .rsvp-message {
            margin-top: 1.2rem;
            font-size: 0.95rem;
            min-height: 1.5em;
        }
        .rsvp-message.success { color: #5a7a5a; }
        .rsvp-message.error   { color: #a05050; }

        /* ── Informace tab ── */
        .info-section {
            max-width: 480px;
            width: 100%;
            margin-bottom: 3rem;
        }
        .info-section h2 {
            font-weight: normal;
            font-size: 1.8rem;
            letter-spacing: 0.05em;
            margin-bottom: 1.5rem;
            color: #555;
        }
        .info-placeholder {
            border: 1px dashed #ccc;
            border-radius: 6px;
            padding: 2.5rem;
            text-align: center;
            color: #aaa;
            font-style: italic;
            font-size: 0.9rem;
            line-height: 1.8;
        }

        /* ── DeepChat floating bubble ── */
        #chat-bubble {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #333;
            color: #fafafa;
            font-size: 1.4rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: background 0.2s;
        }
        #chat-bubble:hover { background: #555; }

        #chat-panel {
            position: fixed;
            bottom: 5rem;
            right: 1.5rem;
            width: 360px;
            height: 520px;
            z-index: 999;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
            overflow: hidden;
            display: none;
        }
        #chat-panel.open { display: block; }

        /* Make DeepChat fill the panel */
        #chat-panel deep-chat {
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }

        @media (max-width: 420px) {
            #chat-panel {
                right: 0.5rem;
                width: calc(100vw - 1rem);
            }
        }
    </style>
</head>
<body>
    <nav class="tab-bar" role="tablist">
        <button class="active" role="tab" data-tab="rsvp">Hlavní stránka</button>
        <button role="tab" data-tab="info">Informace</button>
    </nav>

    <!-- Tab 1: RSVP (original) -->
    <div id="tab-rsvp">
        <img class="invitation" src="invitation.JPG" alt="Svatební oznámení — Pavlína Hlavatá a Luděk Matyska">
        <section class="rsvp-section">
            <h2>Potvrďte účast</h2>
            <p class="subtitle">Prosíme, dejte nám vědět, zda se zúčastníte.</p>

            <form class="rsvp-form" id="rsvpForm" novalidate>
                <label for="jmeno">Jméno</label>
                <input type="text" id="jmeno" name="jmeno"
                       required placeholder="Jméno a příjmení" autocomplete="name">

                <label for="pocet_osob">Počet osob</label>
                <input type="number" id="pocet_osob" name="pocet_osob"
                       required min="0" max="20" value="1">

                <label for="pocet_deti">Počet dětí</label>
                <input type="number" id="pocet_deti" name="pocet_deti"
                       required min="0" max="20" value="0">

                <!-- Honeypot anti-spam field -->
                <input type="text" name="website" id="honeypot"
                       style="position:absolute;left:-9999px" tabindex="-1" autocomplete="off">

                <button type="submit">Odeslat</button>
            </form>

            <div class="rsvp-message" id="rsvpMessage"></div>
        </section>
    </div>

    <!-- Tab 2: Informace -->
    <div id="tab-info" hidden>
        <section class="info-section">
            <h2>Informace</h2>
            <!-- TODO: Add wedding details, schedule, directions, map, dress code, etc. -->
            <div class="info-placeholder">
                Informace budou brzy doplněny.<br>
                Máte dotazy? Použijte chatovací okno vpravo dole.
            </div>
        </section>
    </div>

    <!-- Floating chat bubble -->
    <button id="chat-bubble" aria-label="Otevřít asistenta">💬</button>
    <div id="chat-panel" role="dialog" aria-label="Asistent">
        <deep-chat id="deep-chat"></deep-chat>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/deep-chat@2.4.2/dist/deepChat.bundle.js"></script>
    <script>
    var chatEl = document.getElementById('deep-chat');
    chatEl.connect = { url: '/api/chat', method: 'POST' };
    chatEl.introMessage = { text: 'Ahoj! Jsem váš svatební asistent. Mohu vám pomoci s dotazy ohledně svatby. Na co se chcete zeptat?' };
    chatEl.messageStyles = {
        default: {
            ai:   { bubble: { backgroundColor: '#f0f0f0', color: '#333' } },
            user: { bubble: { backgroundColor: '#333', color: '#fafafa' } }
        }
    };
    </script>

    <script>
    (function() {
        /* ── Tab switching ── */
        var tabs = document.querySelectorAll('.tab-bar button');
        tabs.forEach(function(btn) {
            btn.addEventListener('click', function() {
                tabs.forEach(function(t) { t.classList.remove('active'); });
                btn.classList.add('active');
                document.getElementById('tab-rsvp').hidden = (btn.dataset.tab !== 'rsvp');
                document.getElementById('tab-info').hidden = (btn.dataset.tab !== 'info');
            });
        });

        /* ── Chat bubble toggle ── */
        var bubble = document.getElementById('chat-bubble');
        var panel  = document.getElementById('chat-panel');
        bubble.addEventListener('click', function() {
            var isOpen = panel.classList.toggle('open');
            bubble.setAttribute('aria-expanded', isOpen);
            bubble.textContent = isOpen ? '✕' : '💬';
        });

        /* ── RSVP form ── */
        var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyLyi4ucY7d9vyc8ntimOKoMIFBScfEJ8EOEs3K5lzSKRK87YAysZkNkBBfZXBXEdi-/exec';

        var form    = document.getElementById('rsvpForm');
        var msg     = document.getElementById('rsvpMessage');
        var rsvpBtn = form.querySelector('button');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            var jmeno     = form.jmeno.value.trim();
            var pocetOsob = parseInt(form.pocet_osob.value, 10);
            var pocetDeti = parseInt(form.pocet_deti.value, 10);

            if (!jmeno) {
                showMsg('Prosíme, vyplňte své jméno.', 'error');
                return;
            }
            if (isNaN(pocetOsob) || pocetOsob < 0) {
                showMsg('Prosíme, zadejte platný počet osob.', 'error');
                return;
            }
            if (isNaN(pocetDeti) || pocetDeti < 0) {
                showMsg('Prosíme, zadejte platný počet dětí.', 'error');
                return;
            }

            rsvpBtn.disabled = true;
            rsvpBtn.textContent = 'Odesílám...';
            showMsg('', '');

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    jmeno: jmeno,
                    pocet_osob: pocetOsob,
                    pocet_deti: pocetDeti,
                    website: form.honeypot.value
                })
            })
            .then(function() {
                showMsg('Děkujeme za potvrzení!', 'success');
                form.reset();
                form.pocet_osob.value = '1';
                form.pocet_deti.value = '0';
            })
            .catch(function() {
                showMsg('Došlo k chybě. Zkuste to prosím znovu.', 'error');
            })
            .finally(function() {
                rsvpBtn.disabled = false;
                rsvpBtn.textContent = 'Odeslat';
            });
        });

        function showMsg(text, type) {
            msg.textContent = text;
            msg.className = 'rsvp-message' + (type ? ' ' + type : '');
        }
    })();
    </script>
</body>
</html>
